name: release

# Build and publish the reconciler image to GHCR on every v* tag.
on:
  push:
    tags:
      - 'v*'

# Least privilege by default; the one job that needs more opts in below.
permissions: {}

# A re-pushed tag shouldn't race an in-flight publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  image:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read       # checkout
      packages: write       # push to GHCR
      id-token: write       # keyless signing for the provenance attestation
      attestations: write   # record the build-provenance attestation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          persist-credentials: false  # build job never pushes git; don't leave the token in .git/config

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/unifi-reconciler
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max   # SLSA build provenance baked into the image
          sbom: true             # attach an SBOM attestation

      # Signed, verifiable proof this digest came from this workflow run.
      - uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/unifi-reconciler
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Image digest
        run: |
          echo "### Image published" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "ghcr.io/${{ github.repository_owner }}/unifi-reconciler@${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
